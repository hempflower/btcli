name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          cd cmd/btcli
          CGO_ENABLED=0 go build -o build/btcli .
          cd build
          tar -czf btcli_linux_amd64.tar.gz btcli

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cmd/btcli/build/btcli
            cmd/btcli/build/btcli_linux_amd64.tar.gz
          generate_release_notes: true
